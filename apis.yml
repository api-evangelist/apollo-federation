aid: apollo-federation
name: Apollo Federation
description: >-
  Apollo Federation is an architecture and platform for building a unified
  supergraph that composes multiple GraphQL APIs (subgraphs) into a single
  distributed GraphQL endpoint, enabling teams to work independently on
  different parts of the graph while delivering a unified API to consumers.
