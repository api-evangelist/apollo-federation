apis:
  - aid: apollo-federation:apollo-federation
    name: Apollo Federation
    description: >-
      Apollo Federation enables declarative composition of multiple subgraph APIs
      into a single federated supergraph. The Apollo Router orchestrates requests
      across subgraphs, combining GraphQL APIs and REST APIs (via Apollo Connectors)
      into a unified endpoint. Federation 2 defines the supergraph schema, federation
      directives, and composition rules. The Rover CLI manages schema publishing and
      checks.
    humanURL: https://www.apollographql.com/docs/federation/
